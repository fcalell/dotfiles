; ============================================
; VIT — Visual Interactive Taskwarrior
; ============================================
; Managed by chezmoi (~/.local/share/chezmoi/dot_config/vit/config.ini)
; Lives at ~/.config/vit/config.ini

[vit]
; Default report when launching `vit` with no args.
; "list" = all pending tasks. Switch inside vit with :shortlist, :waiting, etc.
default_report = list
; Confirm before quitting via 'q'
confirmation = false
; Show task IDs as numbers (not UUID prefixes)
row_striping = true

[taskwarrior]
; Tell vit to use the same XDG taskrc
taskrc = ~/.config/task/taskrc

[report]
; Visible columns in vit's table view (overrides report defaults)
indent_subprojects = 2

[color]
; Use 256-color palette aligned with the taskrc theme
enabled = true
; Highlight the +next tag prominently
tag.next = color46
tag.waiting = color244
tag.deep = color93

[keybinding]
; Personal overrides — defaults are good, just a few tweaks below.
; Refer to `man vit` for the full list.

; Quick-add: 'a' opens the add prompt (default), 'A' lets you stay focused after add
; A = task add - then-go-back-to-list

; Navigate by project
; gp = filter:project:
